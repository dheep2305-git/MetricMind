<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetricMind Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📊 MetricMind Dashboard</h1>
    </header>

    <div class="cards">

        <div class="card">
            <h2>Total Sales</h2>
            <p id="sales">₹ --------</p>
        </div>

        <div class="card">
            <h2>Total Profit</h2>
            <p id="profit">₹ --------</p>
        </div>

        <div class="card">
            <h2>Total Orders</h2>
            <p id="orders">--------</p>
        </div>

    </div>

    <div class="section">
        <h2>Sales by Region</h2>

        <div class="box">
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <div class="section">
        <h2>Top Products</h2>

        <div class="box">
            <table id="productTable">

                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Sales</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>

</html>
